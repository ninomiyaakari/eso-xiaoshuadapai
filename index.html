<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --pink: #FF6EB4;
    --pink-light: #FFB3D9;
    --pink-pale: #FFE4F2;
    --blue: #4FC3F7;
    --blue-light: #B3E5FC;
    --jelly-shadow: 0 8px 32px rgba(255,110,180,0.25), 0 2px 8px rgba(79,195,247,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #FFE4F2 0%, #E1F5FE 50%, #FFE4F2 100%);
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    position: relative;
  }

  .bg-bubble {
    position: fixed; border-radius: 50%; opacity: 0.15; pointer-events: none;
    animation: float 6s ease-in-out infinite;
  }
  .bg-bubble:nth-child(1) { width: 300px; height: 300px; background: var(--pink); top: -100px; left: -100px; }
  .bg-bubble:nth-child(2) { width: 200px; height: 200px; background: var(--blue); bottom: -60px; right: -60px; animation-delay: 2s; }
  .bg-bubble:nth-child(3) { width: 150px; height: 150px; background: var(--pink-light); top: 50%; right: -50px; animation-delay: 4s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    padding: 32px 20px;
    position: relative;
    z-index: 1;
    gap: 0;
  }

  .title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .title {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(28px, 7vw, 38px);
    color: var(--pink);
    text-shadow: 3px 3px 0 var(--blue-light), 5px 5px 0 rgba(255,110,180,0.2);
    letter-spacing: 2px;
    font-weight: 900;
    text-align: center;
    line-height: 1.2;
  }

  .subtitle {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: 16px;
    color: #FF6EB4;
    opacity: 0.85;
    letter-spacing: 1px;
    text-align: center;
    margin-top: 6px;
  }

  .spacer { flex-shrink: 0; }

  .wheel-wrapper {
    position: relative;
    width: min(300px, 80vw);
    height: min(300px, 80vw);
    flex-shrink: 0;
  }

  .wheel-outer {
    width: 100%; height: 100%; border-radius: 50%; padding: 8px;
    background: linear-gradient(135deg, var(--pink-light), var(--blue-light), var(--pink-light));
    box-shadow: var(--jelly-shadow), inset 0 2px 8px rgba(255,255,255,0.6);
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: var(--jelly-shadow), inset 0 2px 8px rgba(255,255,255,0.6); }
    50% { box-shadow: 0 12px 40px rgba(255,110,180,0.35), 0 4px 12px rgba(79,195,247,0.2), inset 0 2px 8px rgba(255,255,255,0.6); }
  }

  canvas { border-radius: 50%; display: block; width: 100%; height: 100%; }

  .pointer {
    position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent; border-right: 14px solid transparent;
    border-top: 28px solid var(--pink);
    filter: drop-shadow(0 4px 8px rgba(255,110,180,0.5)); z-index: 10;
  }
  .pointer::after {
    content: ''; position: absolute; top: -30px; left: -10px;
    width: 0; height: 0;
    border-left: 10px solid transparent; border-right: 10px solid transparent;
    border-top: 20px solid white;
  }

  .center-circle {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--pink);
    box-shadow: 0 4px 16px rgba(255,110,180,0.4), inset 0 2px 4px rgba(255,255,255,0.3);
    z-index: 10;
  }

  .spin-btn {
    background: linear-gradient(135deg, var(--pink) 0%, #FF8CC8 50%, var(--blue) 100%);
    color: white; border: none; border-radius: 50px; padding: 16px 48px;
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(16px, 4vw, 20px); font-weight: 700; letter-spacing: 2px;
    cursor: pointer; box-shadow: 0 6px 0 #CC4490, 0 10px 30px rgba(255,110,180,0.4);
    transition: all 0.15s ease; position: relative; overflow: hidden;
    display: block; margin: 0 auto;
  }
  .spin-btn::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background: rgba(255,255,255,0.2); border-radius: 50px 50px 0 0;
  }
  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #CC4490, 0 14px 36px rgba(255,110,180,0.5); }
  .spin-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #CC4490, 0 6px 20px rgba(255,110,180,0.3); }
  .spin-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  .result-overlay {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, rgba(255,110,180,0.95) 0%, rgba(79,195,247,0.95) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .result-overlay.show { opacity: 1; pointer-events: all; }

  .result-card {
    background: white; border-radius: 32px; padding: 40px 48px;
    box-shadow: 0 20px 60px rgba(255,110,180,0.4), 0 0 0 8px rgba(255,255,255,0.3);
    transform: scale(0.5) rotate(-5deg);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 85vw;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .result-overlay.show .result-card { transform: scale(1) rotate(0deg); }

  .result-emoji { font-size: 56px; margin-bottom: 16px; animation: bounce 0.6s ease infinite alternate; text-align: center; width: 100%; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  .result-label { font-family: 'Microsoft YaHei', '微软雅黑', sans-serif; font-size: 13px; color: var(--pink); letter-spacing: 3px; font-weight: 700; margin-bottom: 12px; text-align: center; width: 100%; }
  .result-text { font-family: 'Microsoft YaHei', '微软雅黑', sans-serif; font-size: clamp(22px, 6vw, 32px); color: #333; line-height: 1.3; margin-bottom: 8px; font-weight: 900; text-align: center; width: 100%; }
  .result-options { font-family: 'Microsoft YaHei', '微软雅黑', sans-serif; font-size: 16px; color: var(--blue); font-weight: 700; margin-top: 8px; text-align: center; width: 100%; }

  .tap-hint { font-family: 'Microsoft YaHei', '微软雅黑', sans-serif; color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 32px; letter-spacing: 2px; animation: blink 1.5s ease infinite; text-align: center; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .star { position: fixed; font-size: 24px; animation: star-float 1s ease-out forwards; pointer-events: none; }
  @keyframes star-float { 0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-150px) scale(1.5) rotate(180deg); opacity: 0; } }
</style>
</head>
<body>

<div class="bg-bubble"></div>
<div class="bg-bubble"></div>
<div class="bg-bubble"></div>

<div class="container">
  <div class="title-block">
    <div class="title">✦ 判定轮盘 ✦</div>
    <div class="subtitle">小耍大牌 · 判定牌抽选</div>
  </div>

  <div class="spacer" id="spacerTop"></div>

  <div class="wheel-wrapper" id="wheelWrapper">
    <div class="pointer"></div>
    <div class="wheel-outer">
      <canvas id="wheel"></canvas>
    </div>
    <div class="center-circle"></div>
  </div>

  <div class="spacer" id="spacerBottom"></div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">开始</button>
</div>

<div class="result-overlay" id="resultOverlay" onclick="resetWheel()">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji">🎯</div>
    <div class="result-label">本轮判定</div>
    <div class="result-text" id="resultText"></div>
    <div class="result-options" id="resultOptions"></div>
  </div>
  <div class="tap-hint">点击任意位置继续</div>
</div>

<script>
function equalizeSpacing() {
  const gap = 32;
  document.getElementById('spacerTop').style.height = gap + 'px';
  document.getElementById('spacerBottom').style.height = gap + 'px';
}
equalizeSpacing();
window.addEventListener('resize', equalizeSpacing);

const segments = [
  { label: '同一事务所？', options: '是 / 否', emoji: '🏢', color: '#FF8CC8', textColor: '#fff' },
  { label: '同一队伍？',   options: '是 / 否', emoji: '🎵', color: '#4FC3F7', textColor: '#fff' },
  { label: '花前还是花后？', options: '花前 / 花后', emoji: '🌸', color: '#FF6EB4', textColor: '#fff' },
  { label: '拿着道具？',   options: '是 / 否', emoji: '✨', color: '#81D4FA', textColor: '#fff' },
  { label: '卡面打光？',   options: '暖光 / 冷光', emoji: '💡', color: '#F48FB1', textColor: '#fff' },
  { label: '卡色？',       options: '冷色（蓝/绿）/ 暖色（红/黄）', emoji: '🎨', color: '#29B6F6', textColor: '#fff' },
];

const N = segments.length;
const arc = (2 * Math.PI) / N;
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const size = 600;
canvas.width = size;
canvas.height = size;

let currentAngle = 0;
let isSpinning = false;

function drawWheel(angle) {
  const cx = size/2, cy = size/2, r = size/2 - 4;
  ctx.clearRect(0, 0, size, size);
  segments.forEach((seg, i) => {
    const start = angle + i * arc - Math.PI/2;
    const end = start + arc;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath();
    ctx.fillStyle = seg.color; ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r*0.95,start,end); ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx + r*Math.cos(start), cy + r*Math.sin(start));
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.stroke();
    const midAngle = start + arc/2;
    const ex = cx + r*0.72*Math.cos(midAngle);
    const ey = cy + r*0.72*Math.sin(midAngle);
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(midAngle + Math.PI/2);
    ctx.font = `${size*0.07}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(seg.emoji, 0, -size*0.12);
    ctx.font = `bold ${size*0.044}px 'Microsoft YaHei','微软雅黑',sans-serif`;
    ctx.fillStyle = seg.textColor;
    ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 4;
    ctx.textAlign = 'center';
    const chars = seg.label.split('');
    const lines = [];
    for (let w = 0; w < chars.length; w += 4) lines.push(chars.slice(w,w+4).join(''));
    const lh = size*0.052, totalH = (lines.length-1)*lh;
    lines.forEach((line, li) => ctx.fillText(line, 0, li*lh - totalH/2 + size*0.01));
    ctx.restore();
  });
  ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 6; ctx.stroke();
}

drawWheel(0);

function spin() {
  if (isSpinning) return;
  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;
  const targetIdx = Math.floor(Math.random() * N);
  const baseTarget = -targetIdx * arc - arc/2;
  let targetAngle = baseTarget;
  while (targetAngle < currentAngle + 5 * 2 * Math.PI) targetAngle += 2*Math.PI;
  const duration = 2800;
  const startTime = performance.now();
  const startAngle = currentAngle;
  const totalRotation = targetAngle - startAngle;
  function easeOut(t) { return 1 - Math.pow(1-t, 4); }
  function animate(now) {
    const t = Math.min((now - startTime) / duration, 1);
    currentAngle = startAngle + totalRotation * easeOut(t);
    drawWheel(currentAngle);
    if (t < 1) { requestAnimationFrame(animate); }
    else { currentAngle = targetAngle; isSpinning = false; showResult(targetIdx); }
  }
  requestAnimationFrame(animate);
}

function showResult(idx) {
  const seg = segments[idx];
  document.getElementById('resultEmoji').textContent = seg.emoji;
  document.getElementById('resultText').textContent = seg.label;
  document.getElementById('resultOptions').textContent = seg.options;
  for (let i = 0; i < 8; i++) setTimeout(() => spawnStar(), i*80);
  setTimeout(() => document.getElementById('resultOverlay').classList.add('show'), 100);
}

function spawnStar() {
  const star = document.createElement('div');
  star.className = 'star';
  star.textContent = ['⭐','✨','💫','🌟'][Math.floor(Math.random()*4)];
  star.style.left = (20 + Math.random()*60) + 'vw';
  star.style.top  = (30 + Math.random()*40) + 'vh';
  star.style.animationDelay = Math.random()*0.3 + 's';
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 1200);
}

function resetWheel() {
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('spinBtn').disabled = false;
  drawWheel(currentAngle);
}
</script>
</body>
</html>
